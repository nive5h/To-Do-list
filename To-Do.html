<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    body {
      background-color: #121212;
      color: #E0E0E0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      min-height: 100vh;
    }

    #container {
      width: 100%;
      max-width: 600px;
      background: #1E1E1E;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    h2 {
      background: linear-gradient(to right, #9e9e9e, #e0e0e0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 30px;
    }

    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    #inp {
      flex: 1;
      background: #292929;
      border: none;
      padding: 15px 20px;
      border-radius: 30px;
      font-size: 1rem;
      color: #E0E0E0;
      outline: none;
    }

    #add {
      background: #00BFA6;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 1.5rem;
      color: #121212;
      cursor: pointer;
      transition: background 0.3s;
    }

    #add:hover {
      background: #30f1d7;
    }

    ol {
      list-style: none;
    }

    li {
      background: #535252;
      padding: 12px 15px;
      border-radius: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      transition: transform 0.2s, background 0.3s;
    }

    li:hover {
      background: #6b6b6b;
      transform: scale(1.02);
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ff6b6b;
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .delete-btn:hover {
      transform: scale(1.3);
    }

    .empty-message {
      text-align: center;
      font-style: italic;
      margin-top: 10px;
      color: #aaa;
    }

    @media (max-width: 500px) {
      h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <section id="container">
    <h2>To-Do List 📝</h2>
    <div class="input-section">
      <input type="text" id="inp" placeholder="Enter a task">
      <button id="add">+</button>
    </div>
    <ol id="listss"></ol>
    <p id="emptyMessage" class="empty-message">No tasks yet. Add one!</p>
  </section>

  <script>
    const input = document.getElementById('inp');
    const addBtn = document.getElementById('add');
    const list = document.getElementById('listss');
    const emptyMsg = document.getElementById('emptyMessage');

    function updateEmptyMessage() {
      emptyMsg.style.display = list.children.length === 0 ? 'block' : 'none';
    }

    function addTask() {
      const task = input.value.trim();
      if (!task) {
        alert("Please enter a task");
        return;
      }

      const li = document.createElement('li');
      li.innerHTML = `
        <span>${task}</span>
        <button class="delete-btn" title="Delete task">🗑️</button>
      `;

      li.querySelector('.delete-btn').addEventListener('click', () => {
        if (confirm("Delete this task?")) {
          li.remove();
          updateEmptyMessage();
        }
      });

      list.appendChild(li);
      input.value = '';
      updateEmptyMessage();
    }

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    updateEmptyMessage();
  </script>
</body>
</html>
